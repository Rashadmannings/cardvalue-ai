services:
  postgres:
    image: postgres:16
    container_name: cardvalue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cardvalue_user
      POSTGRES_PASSWORD: cardvalue_password
      POSTGRES_DB: cardvalue_db
    ports:
      - "5432:5432"
    volumes:
      - cardvalue_postgres_data:/var/lib/postgresql/data

volumes:
  cardvalue_postgres_data: